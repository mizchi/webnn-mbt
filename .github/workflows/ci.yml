name: CI

on:
  push:
  pull_request:
  workflow_dispatch:
  schedule:
    - cron: "17 18 * * *"

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

env:
  CI: true

jobs:
  unit:
    name: MoonBit contracts
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - name: Check out source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          version: 10.33.0
          run_install: false

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Set up MoonBit
        uses: moonbit-community/setup-moonbit@04293a8a813bfd4b6c2fce22701b52ae1050d100 # main 2026-07-14
        with:
          version: latest

      - name: Set up just
        uses: extractions/setup-just@53165ef7e734c5c07cb06b3c8e7b647c5aa16db3 # v4
        with:
          just-version: 1.50.0

      - name: Install dependencies
        run: |
          pnpm install --frozen-lockfile
          moon update

      - name: Print toolchain versions
        run: |
          node --version
          pnpm --version
          moon version --all

      - name: Check contracts, formatting, tests, and build
        run: just ci-unit

  webnn:
    name: WebNN Canary E2E
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    env:
      WEBNN_BROWSER_CHANNEL: chromium-tip-of-tree
    steps:
      - name: Check out source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          version: 10.33.0
          run_install: false

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Set up MoonBit
        uses: moonbit-community/setup-moonbit@04293a8a813bfd4b6c2fce22701b52ae1050d100 # main 2026-07-14
        with:
          version: latest

      - name: Set up just
        uses: extractions/setup-just@53165ef7e734c5c07cb06b3c8e7b647c5aa16db3 # v4
        with:
          just-version: 1.50.0

      - name: Install dependencies
        run: |
          pnpm install --frozen-lockfile
          moon update

      - name: Install Chrome Canary for Testing
        run: pnpm exec playwright install --with-deps --only-shell chromium-tip-of-tree

      - name: Run WebNN E2E
        run: just ci-e2e

      - name: Upload Playwright diagnostics
        if: ${{ failure() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: playwright-diagnostics-${{ github.run_attempt }}
          path: |
            playwright-report
            test-results
          if-no-files-found: ignore
          retention-days: 7
